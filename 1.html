<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给你的一封信</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            max-width: 90%;
            width: 500px;
            position: relative;
            transition: all 0.5s ease;
        }

        h1 {
            color: #d63031;
            margin-bottom: 40px;
            font-size: 2rem;
        }

        /* 按钮容器：使用 flex 布局让两个按钮标准左右分开 */
        .btn-group {
            display: flex;
            justify-content: space-between; /* 左右两端对齐 */
            align-items: center;
            max-width: 300px;              /* 限制按钮组的最大宽度 */
            margin: 0 auto;                /* 居中显示 */
            height: 80px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #btn-yes {
            background-color: #ff7675;
            color: white;
            transition: transform 0.2s, background-color 0.3s;
        }

        #btn-yes:hover {
            background-color: #d63031;
            transform: scale(1.05);
        }

        /* 初始状态不使用绝对定位，确保不会重叠 */
        #btn-no {
            background-color: #b2bec3;
            color: white;
            transition: all 0.2s ease;
        }

        /* 第二阶段：输入框页面 */
        .input-section {
            display: none;
        }

        .input-section input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ff7675;
            border-radius: 10px;
            outline: none;
            margin-bottom: 20px;
        }

        .arrow-btn {
            background-color: #ff7675;
            color: white;
            font-size: 1.5rem;
            padding: 10px 25px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .arrow-btn:hover {
            background-color: #d63031;
        }

        /* 第三阶段：最终页面 */
        .final-section {
            display: none;
            font-size: 1.5rem;
            color: #d63031;
            font-weight: bold;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container" id="main-box">
        <!-- 阶段一：初始提问 -->
        <div id="stage-1">
            <h1>孙诗璇你爱我吗</h1>
            <div class="btn-group">
                <button id="btn-yes">爱</button>
                <button id="btn-no">不爱</button>
            </div>
        </div>

        <!-- 阶段二：追问理由 -->
        <div id="stage-2" class="input-section">
            <h1>为什么爱我</h1>
            <input type="text" id="love-reason" placeholder="写下你的理由吧...">
            <button class="arrow-btn" id="btn-next">→</button>
        </div>

        <!-- 阶段三：完美结局 -->
        <div id="stage-3" class="final-section">
            💖 对啦 你对我的爱无需多言 💖
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const btnNext = document.getElementById('btn-next');
        const inputReason = document.getElementById('love-reason');
        
        const stage1 = document.getElementById('stage-1');
        const stage2 = document.getElementById('stage-2');
        const stage3 = document.getElementById('stage-3');

        let noCount = 0; // 记录点击“不爱”的次数

        // --- “不爱”按钮的逻辑 ---
        btnNo.addEventListener('click', function() {
            noCount++;
            
            // 触发移动时，将其改为绝对定位，允许它在容器内乱跑
            if (noCount === 1) {
                btnNo.style.position = 'absolute';
            }

            if (noCount === 1 || noCount === 2) {
                // 第1、2次点击：随机移动位置
                // 围绕原本的位置进行较大幅度的偏移
                const x = Math.random() * 200 - 100; // -100px 到 100px
                const y = Math.random() * 120 - 60;  // -60px 到 60px
                btnNo.style.transform = `translate(${x}px, ${y}px)`;
            } 
            else if (noCount === 3) {
                // 第3次点击：缩小
                btnNo.style.transform = btnNo.style.transform + " scale(0.6)";
            } 
            else if (noCount === 4) {
                // 第4次点击：再次缩小
                btnNo.style.transform = btnNo.style.transform + " scale(0.3)";
            } 
            else if (noCount >= 5) {
                // 第5次点击：彻底消失
                btnNo.style.display = 'none';
            }
        });

        // 鼠标放上去也触发移动/缩小（让对方很难点到，增加趣味性）
        btnNo.addEventListener('mouseover', function() {
            if (noCount < 3) {
                btnNo.click();
            }
        });

        // --- “爱”按钮的逻辑 ---
        btnYes.addEventListener('click', function() {
            stage1.style.display = 'none';
            stage2.style.display = 'block';
        });

        // --- 向后箭头按钮的逻辑 ---
        btnNext.addEventListener('click', function() {
            // 去除前后空格后判断是否为空
            if (inputReason.value.trim() === "") {
                stage2.style.display = 'none';
                stage3.style.display = 'block';
            } else {
                alert("哼，回答错误！请重新输入（提示：什么都不要写哦）");
                inputReason.value = ""; // 清空输入框
            }
        });
    </script>
</body>
</html>
